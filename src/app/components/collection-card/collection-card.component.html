<div class="collection-card" (click)="onView()">
  <div class="collection-card-content">
    <div class="collection-icon-wrapper">
      <i class="pi pi-folder collection-icon"></i>
    </div>
    <div class="collection-info">
      <h3 class="collection-title">{{ collection.name }}</h3>
      @if (collection.description) {
        <p class="collection-description">{{ collection.description }}</p>
      }
    </div>
    <div class="collection-actions" (click)="$event.stopPropagation()">
      <button 
        #deleteButton 
        type="button" 
        pButton 
        icon="pi pi-ellipsis-v" 
        (click)="onMenuToggle($event)" 
        class="p-button-text p-button-rounded p-button-secondary action-button"
        pTooltip="Options"
        tooltipPosition="left">
      </button>
      <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>
    </div>
  </div>
</div>
