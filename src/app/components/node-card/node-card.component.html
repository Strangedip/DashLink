<div class="node-card" (click)="onView()">
  <div class="node-card-content">
    <div class="node-icon-wrapper">
      <i class="pi pi-link node-icon"></i>
    </div>
    <div class="node-info">
      <h3 class="node-title">{{ node.name }}</h3>
      @if (node.description) {
        <p class="node-description" [innerHTML]="node.description"></p>
      }
    </div>
    <div class="node-actions" (click)="$event.stopPropagation()">
      <button 
        #deleteButton 
        type="button" 
        pButton 
        icon="pi pi-ellipsis-v" 
        (click)="onMenuToggle($event)" 
        class="p-button-text p-button-rounded p-button-secondary action-button"
        pTooltip="Options"
        tooltipPosition="left">
      </button>
      <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>
    </div>
  </div>
</div>
